<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}VanService{% endblock %}</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, -apple-system, sans-serif; background: #f5f5f0; color: #1a1a1a; font-size: 15px; line-height: 1.6; }
    a { color: #0f6e56; text-decoration: none; }
    a:hover { text-decoration: underline; }

    nav { background: #085041; color: #fff; padding: 0 1.5rem; display: flex; align-items: center; gap: 2rem; height: 52px; }
    nav .brand { font-size: 17px; font-weight: 600; color: #9fe1cb; letter-spacing: -0.3px; }
    nav a { color: #c8ede3; font-size: 14px; }
    nav a:hover { color: #fff; text-decoration: none; }

    .container { max-width: 1100px; margin: 0 auto; padding: 2rem 1.5rem; }
    h1 { font-size: 22px; font-weight: 600; margin-bottom: 1.25rem; }
    h2 { font-size: 17px; font-weight: 500; margin-bottom: 0.75rem; }

    .card { background: #fff; border: 0.5px solid #ddd; border-radius: 10px; padding: 1.25rem; margin-bottom: 1rem; }
    .stats-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 12px; margin-bottom: 1.5rem; }
    .stat { background: #fff; border: 0.5px solid #ddd; border-radius: 8px; padding: 1rem; text-align: center; }
    .stat-val { font-size: 28px; font-weight: 600; color: #085041; }
    .stat-lbl { font-size: 12px; color: #666; margin-top: 2px; }

    table { width: 100%; border-collapse: collapse; font-size: 14px; }
    th { text-align: left; padding: 8px 12px; background: #f5f5f0; font-weight: 500; font-size: 13px; color: #555; border-bottom: 1px solid #e5e5e0; }
    td { padding: 9px 12px; border-bottom: 0.5px solid #eee; vertical-align: middle; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: #fafaf8; }

    .badge { display: inline-block; padding: 2px 10px; border-radius: 99px; font-size: 12px; font-weight: 500; }
    .badge-available { background: #eaf3de; color: #3b6d11; }
    .badge-on_route  { background: #e6f1fb; color: #185fa5; }
    .badge-maintenance { background: #faeeda; color: #854f0b; }
    .badge-inactive  { background: #f1efe8; color: #5f5e5a; }
    .badge-scheduled { background: #faeeda; color: #854f0b; }
    .badge-in_progress { background: #e6f1fb; color: #185fa5; }
    .badge-completed { background: #eaf3de; color: #3b6d11; }
    .badge-cancelled { background: #fcebeb; color: #a32d2d; }

    .btn { display: inline-block; padding: 7px 16px; border-radius: 7px; font-size: 13px; font-weight: 500; cursor: pointer; border: 0.5px solid #ccc; background: #fff; color: #1a1a1a; transition: background 0.15s; }
    .btn:hover { background: #f5f5f0; text-decoration: none; }
    .btn-primary { background: #1d9e75; color: #fff; border-color: #1d9e75; }
    .btn-primary:hover { background: #0f6e56; }
    .btn-danger { background: #fff; color: #a32d2d; border-color: #f09595; }
    .btn-danger:hover { background: #fcebeb; }
    .btn-sm { padding: 4px 10px; font-size: 12px; }

    form label { display: block; font-size: 13px; font-weight: 500; margin-bottom: 4px; color: #444; }
    form input, form select, form textarea { width: 100%; padding: 8px 10px; border: 0.5px solid #ccc; border-radius: 6px; font-size: 14px; font-family: inherit; background: #fff; margin-bottom: 14px; }
    form input:focus, form select:focus, form textarea:focus { outline: 2px solid #1d9e75; border-color: transparent; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .form-actions { display: flex; gap: 10px; margin-top: 8px; }

    .messages { margin-bottom: 1rem; }
    .message { padding: 10px 14px; border-radius: 7px; font-size: 14px; margin-bottom: 6px; background: #eaf3de; color: #27500a; border: 0.5px solid #c0dd97; }

    .page-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.25rem; }
    .actions { display: flex; gap: 8px; }

    .empty { color: #888; font-size: 14px; padding: 2rem; text-align: center; }
  </style>
</head>
<body>
<nav>
  <span class="brand">VanService</span>
  <a href="{% url 'dashboard' %}">Dashboard</a>
  <a href="{% url 'van_list' %}">Vans</a>
  <a href="{% url 'driver_list' %}">Drivers</a>
  <a href="{% url 'trip_list' %}">Trips</a>
  <a href="/admin/" style="margin-left:auto;">Admin</a>
</nav>

<div class="container">
  {% if messages %}
  <div class="messages">
    {% for msg in messages %}<div class="message">{{ msg }}</div>{% endfor %}
  </div>
  {% endif %}

  {% block content %}{% endblock %}
</div>
</body>
</html>
