{% extends "tracking/base.html" %}
{% block title %}Delete {{ type }} — VanService{% endblock %}

{% block content %}
<div style="max-width:480px;margin:3rem auto">
  <div class="card" style="text-align:center;padding:2rem">
    <div style="font-size:32px;margin-bottom:1rem">🗑️</div>
    <h1 style="margin-bottom:0.5rem">Delete {{ type }}</h1>
    <p style="color:#555;margin-bottom:1.5rem">Are you sure you want to delete <strong>{{ object }}</strong>? This cannot be undone.</p>
    <form method="post" style="display:flex;gap:10px;justify-content:center">
      {% csrf_token %}
      <button type="submit" class="btn btn-danger">Yes, delete</button>
      <a href="javascript:history.back()" class="btn">Cancel</a>
    </form>
  </div>
</div>
{% endblock %}
